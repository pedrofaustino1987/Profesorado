<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profesorado de Educacion Secundaria en Tecnologias</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#c8c4c0;
      background-image:radial-gradient(circle at 30% 40%,rgba(255,255,255,0.08) 0%,transparent 50%),
                        radial-gradient(circle at 70% 60%,rgba(0,0,0,0.05) 0%,transparent 50%);
      padding:1.5rem;padding-bottom:5rem;
      user-select:none;-webkit-user-select:none;
    }

    .notebook{
      display:flex;width:min(90vw,740px);aspect-ratio:210/148;position:relative;
      perspective:2200px;
    }

    .cover-back,.cover-front{
      width:calc(50% - 20px);background:#1c1917;position:relative;z-index:1;flex-shrink:0;
    }
    .cover-back{
      border-radius:8px 0 0 8px;
      box-shadow:-4px 4px 14px rgba(0,0,0,0.35),inset 0 0 40px rgba(0,0,0,0.18);
    }
    .cover-front{
      border-radius:0 8px 8px 0;
      box-shadow:4px 4px 14px rgba(0,0,0,0.35),inset 0 0 40px rgba(0,0,0,0.18);
    }
    .cover-back::before,.cover-front::before{
      content:'';position:absolute;inset:10px;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg width='4' height='4' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' x='0' y='0' fill='rgba(255,255,255,0.02)'/%3E%3Crect width='1' height='1' x='2' y='2' fill='rgba(0,0,0,0.03)'/%3E%3C/svg%3E");
    }
    .cover-back::before{border:1px solid rgba(255,255,255,0.045);border-radius:4px 0 0 4px}
    .cover-front::before{border:1px solid rgba(255,255,255,0.045);border-radius:0 4px 4px 0}
    .cover-back::after,.cover-front::after{
      content:'';position:absolute;inset:0;pointer-events:none;
    }
    .cover-back::after{
      border-radius:8px 0 0 8px;
      background:linear-gradient(135deg,rgba(255,255,255,0.07) 0%,transparent 40%,rgba(0,0,0,0.12) 100%);
    }
    .cover-front::after{
      border-radius:0 8px 8px 0;
      background:linear-gradient(225deg,rgba(255,255,255,0.07) 0%,transparent 40%,rgba(0,0,0,0.12) 100%);
    }

    .cover-spine{
      width:40px;background:#1c1917;position:relative;z-index:5;flex-shrink:0;
      box-shadow:inset 2px 0 8px rgba(0,0,0,0.2),inset -2px 0 8px rgba(0,0,0,0.2);
    }
    .cover-spine::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.06)}
    .cover-spine::after{content:'';position:absolute;right:8px;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.06)}

    .page-left,.page-right{
      position:absolute;top:6px;bottom:6px;width:calc(50% - 26px);z-index:3;border-radius:2px;
      background-color:#fff;
      background-image:
        linear-gradient(to right,transparent 47px,#fca5a5 47px,#fca5a5 49px,transparent 49px),
        repeating-linear-gradient(to bottom,transparent,transparent 31px,#e2e0dd 31px,#e2e0dd 32px);
      background-size:100% 100%,100% 32px;background-position:0 0,0 24px;
      padding:14px 16px 14px 54px;overflow:hidden;
      transition:opacity 0.15s ease;
    }
    .page-left{
      left:6px;box-shadow:2px 2px 8px rgba(0,0,0,0.1),0 1px 3px rgba(0,0,0,0.06);
    }
    .page-left::after{
      content:'';position:absolute;right:0;top:0;bottom:0;width:14px;
      background:linear-gradient(to left,rgba(0,0,0,0.05),transparent);pointer-events:none;
    }
    .page-right{
      right:6px;box-shadow:-2px 2px 8px rgba(0,0,0,0.1),0 1px 3px rgba(0,0,0,0.06);
    }
    .page-right::after{
      content:'';position:absolute;left:0;top:0;bottom:0;width:14px;
      background:linear-gradient(to right,rgba(0,0,0,0.05),transparent);pointer-events:none;
    }
    .page-right::before{
      content:'';position:absolute;bottom:0;right:0;width:28px;height:28px;
      background:linear-gradient(315deg,rgba(0,0,0,0.06) 0%,rgba(0,0,0,0.02) 40%,transparent 50%);
      border-radius:0 0 2px 0;opacity:0;transition:opacity 0.3s ease;pointer-events:none;z-index:2;
    }
    .notebook:hover .page-right::before{opacity:1}

    .page-number{
      position:absolute;bottom:6px;
      font-family:'Inter',sans-serif;font-size:7px;color:#a8a29e;letter-spacing:0.04em;
    }
    .page-left .page-number{right:14px}
    .page-right .page-number{left:54px}

    .page-content{position:relative;z-index:1}
    .page-content h1{
      font-family:'Playfair Display',serif;font-size:clamp(11px,1.7vw,16px);font-weight:600;
      color:#1c1917;line-height:1.3;margin-bottom:10px;letter-spacing:0.02em;text-transform:uppercase;
    }
    .page-content h1 span{display:block;width:36px;height:2px;background:#b45309;margin-top:5px}
    .page-content h2{
      font-family:'Playfair Display',serif;font-size:clamp(9px,1.4vw,13px);font-weight:600;
      color:#1c1917;line-height:1.3;margin-bottom:8px;margin-top:14px;letter-spacing:0.02em;
      text-transform:uppercase;padding-bottom:4px;border-bottom:1px solid #e7e5e4;
    }
    .page-content .item{margin-bottom:8px;padding-left:10px;position:relative}
    .page-content .item::before{
      content:'';position:absolute;left:0;top:6px;width:4px;height:4px;border-radius:50%;background:#b45309;
    }
    .page-content .item.alt::before{background:#78716c}
    .page-content .item p{
      font-family:'Inter',sans-serif;font-size:clamp(7px,1vw,9.5px);color:#44403c;line-height:1.5;
    }
    .page-content .item p strong{color:#1c1917;font-weight:600}
    .page-content .item p em{font-style:italic;color:#78716c}
    .page-content .quote{
      margin:8px 0;padding:6px 10px;border-left:2px solid #b45309;
      background:rgba(180,83,9,0.04);border-radius:0 3px 3px 0;
    }
    .page-content .quote p{
      font-family:'Inter',sans-serif;font-size:clamp(7px,1vw,9.5px);color:#57534e;line-height:1.5;font-style:italic;
    }

    .spiral{
      position:absolute;left:50%;transform:translateX(-50%);top:0;bottom:0;width:48px;
      z-index:10;pointer-events:none;overflow:hidden;
    }

    .flip-element{
      position:absolute;top:6px;bottom:6px;transform-style:preserve-3d;z-index:7;pointer-events:none;
    }
    .flip-next{right:6px;width:calc(50% - 26px);transform-origin:left center}
    .flip-prev{left:6px;width:calc(50% - 26px);transform-origin:right center}

    .flip-face{
      position:absolute;inset:0;backface-visibility:hidden;border-radius:2px;
      background-color:#fff;
      background-image:
        linear-gradient(to right,transparent 47px,#fca5a5 47px,#fca5a5 49px,transparent 49px),
        repeating-linear-gradient(to bottom,transparent,transparent 31px,#e2e0dd 31px,#e2e0dd 32px);
      background-size:100% 100%,100% 32px;background-position:0 0,0 24px;
      padding:14px 16px 14px 54px;overflow:hidden;
    }
    .flip-back-face{transform:rotateY(180deg)}
    .flip-face::after{
      content:'';position:absolute;top:0;bottom:0;width:14px;pointer-events:none;
    }
    .flip-front-right::after{
      left:0;background:linear-gradient(to right,rgba(0,0,0,0.05),transparent);
    }
    .flip-front-left::after{
      right:0;background:linear-gradient(to left,rgba(0,0,0,0.05),transparent);
    }
    .flip-back-right::after{
      right:0;background:linear-gradient(to left,rgba(0,0,0,0.05),transparent);
    }
    .flip-back-left::after{
      left:0;background:linear-gradient(to right,rgba(0,0,0,0.05),transparent);
    }

    .flip-page-shadow{
      position:absolute;top:6px;bottom:6px;width:30px;z-index:6;pointer-events:none;
      opacity:0;transition:opacity 0.25s ease 0.08s;
    }
    .flip-page-shadow.next{left:calc(50% - 10px);background:linear-gradient(to right,rgba(0,0,0,0.18),transparent)}
    .flip-page-shadow.prev{right:calc(50% - 10px);background:linear-gradient(to left,rgba(0,0,0,0.18),transparent)}

    .tabs{
      position:absolute;right:-32px;top:0;bottom:0;width:40px;z-index:15;
      display:flex;flex-direction:column;justify-content:center;gap:5px;padding:20px 0;
    }
    .tab{
      border-radius:0 6px 6px 0;cursor:pointer;
      transition:all 250ms cubic-bezier(0.4,0,0.2,1);
      box-shadow:2px 2px 6px rgba(0,0,0,0.2);border:1px solid rgba(0,0,0,0.12);border-left:none;
      display:flex;align-items:center;justify-content:center;position:relative;
    }
    .tab:hover{transform:translateX(-4px);box-shadow:3px 3px 10px rgba(0,0,0,0.3)}
    .tab.active{transform:translateX(-6px);box-shadow:4px 3px 12px rgba(0,0,0,0.35)}
    .tab-text{
      writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);
      font-family:'Inter',sans-serif;font-size:6.5px;font-weight:700;
      letter-spacing:0.12em;text-transform:uppercase;line-height:1;color:#fff;
    }
    .tab-1{background:#3b82f6;width:30px;height:100px;padding:8px 0}
    .tab-2{background:#22c55e;width:22px;height:70px;padding:6px 0}
    .tab-3{background:#ec4899;width:22px;height:70px;padding:6px 0}
    .tab-4{background:#f59e0b;width:22px;height:70px;padding:6px 0}
    .tab-5{background:#8b5cf6;width:22px;height:70px;padding:6px 0}

    .page-nav{
      display:flex;align-items:center;gap:1rem;margin-top:1.5rem;
    }
    .page-nav button{
      width:40px;height:40px;border-radius:50%;border:none;background:#1c1917;color:#fafaf9;
      font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:all 200ms ease;box-shadow:0 2px 8px rgba(0,0,0,0.2);
    }
    .page-nav button:hover:not(:disabled){background:#44403c;transform:scale(1.08)}
    .page-nav button:active:not(:disabled){transform:scale(0.95)}
    .page-nav button:disabled{background:#a8a29e;cursor:not-allowed;opacity:0.4}
    .page-nav span{
      font-family:'Inter',sans-serif;font-size:0.75rem;color:#78716c;
      letter-spacing:0.05em;min-width:60px;text-align:center;
    }

    .page-fade-out{opacity:0 !important;transition:opacity 0.2s ease !important}
    .page-fade-in{opacity:0;transition:opacity 0.25s ease 0.05s !important}

    @media(max-width:500px){
      .tabs{right:-24px;width:32px;gap:3px}
      .tab-1{width:24px;height:70px}
      .tab-2,.tab-3,.tab-4,.tab-5{width:16px;height:48px}
      .tab-text{font-size:5.5px}
    }
  </style>
</head>
<body>

  <div class="notebook" id="notebook">
    <div class="cover-back"></div>
    <div class="cover-spine"></div>
    <div class="cover-front"></div>

    <div class="page-left" id="page-left">
      <div class="page-content" id="left-content"></div>
      <div class="page-number" id="page-num-left"></div>
    </div>
    <div class="page-right" id="page-right">
      <div class="page-content" id="right-content"></div>
      <div class="page-number" id="page-num-right"></div>
    </div>

    <div class="spiral">
      <svg style="position:absolute;inset:0;width:100%;height:100%" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="sp" patternUnits="userSpaceOnUse" width="48" height="24">
            <ellipse cx="24" cy="6" rx="24" ry="6" fill="#1c1917"/>
            <ellipse cx="24" cy="4" rx="16" ry="2" fill="none" stroke="#57534e" stroke-width="0.5" opacity="0.4"/>
            <rect x="6" y="12" width="36" height="12" rx="1.5" fill="#f5f5f4" stroke="#e7e5e4" stroke-width="0.2"/>
          </pattern>
        </defs>
        <rect x="0" y="0" width="48" height="3000" fill="url(#sp)"/>
      </svg>
    </div>

    <div class="tabs" id="tabs">
      <div class="tab tab-1 active" data-section="0">
        <span class="tab-text">Pr&aacute;ctica I</span>
      </div>
      <div class="tab tab-2" data-section="1"></div>
      <div class="tab tab-3" data-section="2"></div>
      <div class="tab tab-4" data-section="3"></div>
      <div class="tab tab-5" data-section="4"></div>
    </div>
  </div>

  <div class="page-nav">
    <button id="prev-btn" disabled aria-label="Página anterior">←</button>
    <span id="page-info">1 / 1</span>
    <button id="next-btn" disabled aria-label="Página siguiente">→</button>
  </div>

  <script>
    const allItems = [
      '<h1>El sentido de la formaci&oacute;n docente<span></span></h1>',
      '<div class="item"><p><strong>Reflexi&oacute;n</strong></p></div>',
      '<div class="item alt"><p>Una acci&oacute;n vuelve sobre s&iacute; misma</p></div>',
      '<div class="item"><p>Postulan un v&iacute;nculo entre dos objetos o sujetos</p></div>',
      '<div class="item alt"><p>En el campo de la formaci&oacute;n docente podemos hablar de un <strong>hacer que implica un decir</strong> de un individuo a otro, o a s&iacute; mismo</p></div>',
      '<div class="item"><p>Obtener nuevas comprensiones y apreciaciones</p></div>',
      '<div class="item alt"><p><strong>Describir los procesos reflexivos de los docentes:</strong> reflexi&oacute;n en la acci&oacute;n, metacognici&oacute;n, aprendizaje reflexivo, introspecci&oacute;n, retorno sobre s&iacute; mismo</p></div>',
      '<div class="item"><p>El pensamiento o la reflexi&oacute;n es el <strong>discernimiento de la relaci&oacute;n</strong> que existe entre lo que tratamos de hacer y lo que ocurre como consecuencia</p></div>',
      '<div class="item alt"><p><em>El pensar es un proceso de indagaci&oacute;n, de observar las cosas</em> (Dewey, 1989: 171)</p></div>',
      '<div class="item"><p>La reflexi&oacute;n como un <strong>proceso cognitivo activo y deliberativo</strong> que incluye creencias y conocimientos de los profesores</p></div>',
      '<div class="item alt"><p>Dise&ntilde;ar algo para salir de la incertidumbre, convocar a los conocimientos y experiencias anteriores y proceder a su cr&iacute;tica para hallar <strong>fundamentos te&oacute;ricos s&oacute;lidos</strong>, revisar y ampliar la observaci&oacute;n de los datos, as&iacute; como hurgar en la memoria para dar con circunstancias an&aacute;logas que ayuden a replantear el problema</p></div>',
      '<div class="quote"><p>Es un proceso de inferencia donde se produce &ldquo;salto de lo conocido a lo desconocido&rdquo;</p></div>',
      '<div class="item"><p>Las investigaciones sobre la reflexi&oacute;n acerca de la <strong>pr&aacute;ctica docente</strong> cobran fuerza a partir de los programas de estudio en relaci&oacute;n con &ldquo;el pensamiento del profesor&rdquo;</p></div>',
      '<div class="item alt"><p>Una pregunta interesante que se formula <em>Eliane Ricard Fersing (1999)</em> es si es necesario debatir la relevancia de la <strong>pr&aacute;ctica reflexiva</strong> cuando uno trata de ser un docente, o si el <strong>ser docente ya implica una actividad reflexiva</strong></p></div>',
      '<div class="item"><p>La reflexi&oacute;n no ten&iacute;a lugar como objeto de estudio porque estaban centrados solo en la <strong>actuaci&oacute;n de la propia labor pedag&oacute;gica</strong></p></div>',
      '<div class="item alt"><p><strong>Analizar proyectos de formaci&oacute;n</strong> o de mejora de la pr&aacute;ctica docente</p></div>',

      '<h2>Espacio, tiempo y condiciones para la reflexi&oacute;n</h2>',
      '<div class="item"><p>La reflexi&oacute;n es una <strong>forma de pensamiento y una disposici&oacute;n</strong>. La distinci&oacute;n se&ntilde;alada solo intenta discriminar la acci&oacute;n rutinaria, impulsiva, de aquella persistente que muestra una <strong>actitud comprometida y una mente abierta</strong> que considera la pr&aacute;ctica a la luz de conocimientos y creencias <em>(Nofke y Brennan, 1998)</em></p></div>',
      '<div class="item alt"><p>Existen <strong>diferentes tiempos de reflexi&oacute;n</strong>, ligados al momento en que se est&aacute; actuando, al finalizar la acci&oacute;n y sobre la propia reflexi&oacute;n</p></div>',
      '<div class="item"><p>La reflexi&oacute;n en la acci&oacute;n poseer una <strong>funci&oacute;n cr&iacute;tica</strong> y pone en cuesti&oacute;n la estructura de suposici&oacute;n del conocimiento en la acci&oacute;n</p></div>',
      '<div class="item alt"><p>Pensamos de manera cr&iacute;tica sobre el pensamiento que nos trajo esta situaci&oacute;n de apuro o a esta oportunidad y durante el proceso podemos <strong>reestructrar estrategias de acci&oacute;n</strong> as&iacute; como la comprensi&oacute;n de los fen&oacute;menos o las maneras de formular los problemas <em>(Sch&ouml;n, 1987: 3)</em></p></div>',
      '<div class="item"><p><em>Liston y Zeichner (1996)</em> afirman que no podemos hablar de reflexi&oacute;n docente si este no se pregunta alguna vez por los <strong>valores que gu&iacute;an su trabajo</strong>, el contexto en el que lo hace y las presunciones y supuestos con los que desarrolla su tarea</p></div>',

      '<h2>Modelos te&oacute;ricos para comprender el aprendizaje reflexivo</h2>',
      '<div class="item"><p><em>Argyris y Sch&ouml;n (1974)</em> refiere a la relaci&oacute;n entre <strong>&ldquo;teor&iacute;as en uso&rdquo;</strong> y <strong>&ldquo;teor&iacute;as adoptadas&rdquo;</strong></p></div>',
      '<div class="item alt"><p>Las personas <strong>planean, aplican y revisan</strong> sus acciones</p></div>',
      '<div class="item"><p>Pueden conceptualizarse y verbalizarse</p></div>',
      '<div class="item alt"><p>Las <strong>teor&iacute;as de uso</strong> gobiernan nuestras conductas y tienden a ser <strong>estructuras t&aacute;citas</strong></p></div>',
      '<div class="item"><p>Las <strong>teor&iacute;as adoptadas</strong> son lo que pensamos o que deber&iacute;a hacerse</p></div>',
      '<div class="item alt"><p>En la teor&iacute;a adoptada tiene que ver la <strong>acci&oacute;n para el contexto</strong></p></div>',
      '<div class="item"><p>Es donde obedece y comunica a otros</p></div>',
      '<div class="item alt"><p>La <strong>brecha entre la teor&iacute;a en uso y la teor&iacute;a adoptada</strong> delimita un espacio din&aacute;mico para la reflexi&oacute;n y para el di&aacute;logo</p></div>',
      '<div class="item"><p>Mediada por la escritura, la reflexi&oacute;n puede realizarse con posterioridad en <strong>grupos de tutor&iacute;a</strong> e, incluso, en el intercambio con otros colegas que se est&eacute;n formando</p></div>',
      '<div class="item alt"><p><em>M. Shepherd (2006)</em>, investigador de la Universidad de Brighton, Gran Breta&ntilde;a, ech&oacute; luz sobre los <strong>aprendizajes t&aacute;citos</strong> a trav&eacute;s de un proceso de reflexi&oacute;n del tipo <strong>double-loop</strong> (&ldquo;doble tuerca&rdquo; o &ldquo;bucle&rdquo;), realizado por medio del uso de &ldquo;diarios de reflexi&oacute;n&rdquo; acerca de las pr&aacute;cticas</p></div>',
      '<div class="item"><p>El proceso supone <strong>cuestionar cr&iacute;ticamente</strong> el marco y el sistema de aprendizaje que subyacen a los prop&oacute;sitos y objetivos</p></div>',
      '<div class="item alt"><p>Es probable que se produzcan <strong>cambios en las pr&aacute;cticas de ense&ntilde;anza</strong> y que devengan en mejores oportunidades para hacer accesible el contenido a los alumnos</p></div>',
      '<div class="item"><p><em>Scanlon y Chemomas (1997)</em> describen <strong>tres etapas</strong> en el proceso de aprendizaje reflexivo:</p></div>',
      '<div class="item alt"><p><strong>1)</strong> La conciencia o conocimiento que se inicia cuando el individuo reconoce la <strong>falta de informaci&oacute;n</strong> para explicar algo</p></div>',
      '<div class="item"><p><strong>2)</strong> El <strong>an&aacute;lisis cr&iacute;tico</strong> que considera la conciencia sobre el propio conocimiento y la utilizaci&oacute;n de nueva informaci&oacute;n, as&iacute; como el desarrollo de procesos de s&iacute;ntesis y de evaluaci&oacute;n</p></div>',
      '<div class="item alt"><p><strong>3)</strong> La <strong>nueva perspectiva</strong> que surge del resultado del an&aacute;lisis y utilizaci&oacute;n de la informaci&oacute;n nueva, e indica que el individuo ha adquirido comprensi&oacute;n del concepto, situaci&oacute;n o evento</p></div>',
      '<div class="item"><p><em>Kember y Wong</em> establecen <strong>tres niveles de reflexi&oacute;n</strong> para categorizar a los estudiantes <em>(Kember et al., 1999)</em>:</p></div>',
      '<div class="item alt"><p><strong>1) No reflexivo:</strong> el conocimiento previo no es revisado, ni cuestionada su validez</p></div>',
      '<div class="item"><p><strong>2) Reflexivo:</strong> refiere tanto al contenido, es decir, al &ldquo;qu&eacute;&rdquo; reflexionamos, como al proceso vinculado a c&oacute;mo realizamos esas reflexiones</p></div>',
      '<div class="item alt"><p><strong>3) Reflexivo cr&iacute;tico:</strong> <strong>cambio significativo de perspectiva</strong> en sus modos de interpretar las situaciones que analiza</p></div>',
      '<div class="item"><p>Una pr&aacute;ctica cr&iacute;tica de la ense&ntilde;anza requiere el desarrollo de una <strong>gran capacidad para reflexionar en y sobre la acci&oacute;n</strong></p></div>',
      '<div class="item alt"><p><em>Hatton y Smith (1995)</em> intentaba establecer los <strong>niveles de articulaci&oacute;n</strong> entre los datos de la experiencia personal y los saberes manejados por el docente:</p></div>',
      '<div class="item"><p><strong>1) Descripciones no reflexivas:</strong> informan acerca de hechos o bibliograf&iacute;a</p></div>',
      '<div class="item alt"><p><strong>2) Reflexiones descriptivas:</strong> intentan proveer razones basadas con frecuencia en opiniones personales y en experiencias previas m&aacute;s que en evidencias de la literatura o de la investigaci&oacute;n</p></div>',
      '<div class="item"><p><strong>3) Reflexiones dialogadas:</strong> son una forma de discurso deliberativo con uno mismo, explorando posibles razones, estableciendo relaciones con conocimientos previos, con conocimientos producidos en investigaciones y con fuentes bibliogr&aacute;ficas</p></div>',
      '<div class="item alt"><p><strong>4) Reflexiones cr&iacute;ticas:</strong> dan cuenta de las razones en la toma de decisiones, considerando el <strong>contexto hist&oacute;rico, social y pol&iacute;tico</strong>. Se basan en argumentos y razonamientos</p></div>',
      '<div class="item"><p>Los contenidos podemos establecer que se refieren a:</p></div>',
      '<div class="item alt"><p><strong>1)</strong> Sus historias como alumnos, como practicantes, como docentes o incluso sobre sus propios docentes. Recuperan <strong>experiencias que han dejado huellas</strong> y que les abren una serie de interrogaciones acerca del ejercicio de la docencia</p></div>',
      '<div class="item"><p><strong>2)</strong> <em>Davies (1998)</em> plantea que los docentes refieren a esta cuesti&oacute;n cuando examinan sus trabajos en t&eacute;rminos de algunas teor&iacute;as y que estas ocupan algunas veces la <strong>voz del docente</strong></p></div>',
      '<div class="item alt"><p><strong>3)</strong> Aspectos de su <strong>profesi&oacute;n base</strong>, entendida como aquella en la que el docente se form&oacute; en primera instancia y cuyos contenidos son los que ense&ntilde;a</p></div>',

      '<h2>Problemas asociados con la reflexi&oacute;n</h2>',
      '<div class="item"><p>Los docentes necesitan <strong>tiempo y oportunidad</strong> para que la reflexi&oacute;n ocurra y se convierta en un <strong>modo de trabajo y no en un ritual</strong></p></div>',
      '<div class="item alt"><p>La <strong>falta de orientaci&oacute;n</strong> cuando la invitaci&oacute;n a reflexionar no es parte habitual del trabajo docente</p></div>',
      '<div class="item"><p>Las reacciones posibles a las demandas de reflexi&oacute;n requieren cierta <strong>atenci&oacute;n de parte de los formadores</strong></p></div>',
      '<div class="item alt"><p>Hacer expl&iacute;cito un proceso de reflexi&oacute;n, reconociendo <strong>debilidades, dudas, incertidumbres</strong>, aspectos personales de la vida profesional dentro de una instituci&oacute;n</p></div>',
      '<div class="item"><p><em>Day (1999), Van Manen (1995) y Cole (1989)</em> reconocen algunas <strong>restricciones para ser reflexivo</strong>:</p></div>',
      '<div class="item alt"><p>La consideraci&oacute;n de la reflexi&oacute;n como <strong>disruptiva, desestabilizadora y distractora</strong> del logro del buen desempe&ntilde;o de la tarea</p></div>',
      '<div class="item"><p>La duda sobre su <strong>utilidad significativa</strong></p></div>',
      '<div class="item alt"><p>Las creencias en el valor relativo del conocimiento, derivado de la reflexi&oacute;n personal y comparada con el producido por una <strong>racionalidad t&eacute;cnica</strong></p></div>',
      '<div class="item"><p>La preocupaci&oacute;n de los docentes novatos por adquirir un <strong>conjunto de reglas acerca de c&oacute;mo hacer</strong>, lo que significa que no necesariamente tienen el deseo o la capacidad para comprometerse con una reflexi&oacute;n</p></div>',
      '<div class="item alt"><p>La creencia de que algunas caracter&iacute;sticas del entorno, como la <strong>impredecibilidad o el cambio</strong>, pueden dificultar el compromiso con la reflexi&oacute;n</p></div>',
      '<div class="item"><p>La <strong>falta de un lenguaje compartido</strong> para conversar sobre qu&eacute; es la reflexi&oacute;n y el proceso de reflexi&oacute;n</p></div>',

      '<h2>Preguntas para la reflexi&oacute;n</h2>',
      '<div class="item"><p><strong>1)</strong> Analiza la importancia de la reflexi&oacute;n como herramienta para el crecimiento profesional en la formaci&oacute;n docente. &iquest;De qu&eacute; manera contribuye a mejorar las pr&aacute;cticas pedag&oacute;gicas?</p></div>',
      '<div class="item alt"><p><strong>2)</strong> Reflexiona sobre las condiciones y espacios necesarios para promover una pr&aacute;ctica reflexiva efectiva en la formaci&oacute;n de docentes. &iquest;Qu&eacute; dificultades se pueden presentar y c&oacute;mo podr&iacute;an superarse?</p></div>',
      '<div class="item"><p><strong>3)</strong> &iquest;De qu&eacute; modo la reflexi&oacute;n puede fortalecer la autonom&iacute;a y la criticidad del docente en su ejercicio profesional?</p></div>',
      '<div class="item alt"><p><strong>4)</strong> &iquest;Qu&eacute; fragmento del video (atendiendo a sus propias biograf&iacute;as escolares) los convoca a reflexionar sobre sus futuras pr&aacute;cticas docentes? Desarrollar brevemente la idea</p></div>'
    ];

    const SECTION_STARTS = [0, 16, 22, 53, 64];

    let pages = [];
    let pageItemRanges = [];
    let currentSpread = 0;
    let totalSpreads = 1;
    let isFlipping = false;
    const FLIP_DURATION = 700;

    function paginate() {
      pages = [];
      pageItemRanges = [];
      const measurePage = document.getElementById('page-left');
      const measureContent = document.getElementById('left-content');
      let remaining = [...allItems];
      let idx = 0;

      while (remaining.length > 0) {
        measureContent.innerHTML = '';
        const pageItems = [];
        for (let i = 0; i < remaining.length; i++) {
          const prevHTML = measureContent.innerHTML;
          measureContent.innerHTML += remaining[i];
          if (measurePage.scrollHeight > measurePage.clientHeight + 2 && pageItems.length > 0) {
            measureContent.innerHTML = prevHTML;
            break;
          }
          pageItems.push(remaining[i]);
        }
        pages.push(pageItems.join(''));
        pageItemRanges.push({ start: idx, end: idx + pageItems.length - 1 });
        idx += pageItems.length;
        remaining = remaining.slice(pageItems.length);
      }

      measureContent.innerHTML = '';
      document.getElementById('right-content').innerHTML = '';
      totalSpreads = Math.ceil(pages.length / 2);
      currentSpread = Math.min(currentSpread, totalSpreads - 1);
      showSpread();
    }

    function showSpread() {
      const li = currentSpread * 2;
      const ri = currentSpread * 2 + 1;
      document.getElementById('left-content').innerHTML = pages[li] || '';
      document.getElementById('right-content').innerHTML = pages[ri] || '';
      document.getElementById('page-num-left').textContent = li < pages.length ? String(li + 1) : '';
      document.getElementById('page-num-right').textContent = ri < pages.length ? String(ri + 1) : '';
      updateNav();
      updateTabs();
    }

    function updateNav() {
      document.getElementById('page-info').textContent = `${currentSpread + 1} / ${totalSpreads}`;
      document.getElementById('prev-btn').disabled = currentSpread === 0;
      document.getElementById('next-btn').disabled = currentSpread >= totalSpreads - 1;
    }

    function updateTabs() {
      const li = currentSpread * 2;
      const ri = Math.min(currentSpread * 2 + 1, pages.length - 1);
      const activeIdx = pageItemRanges.length > 0 ? getActiveSection(li, ri) : 0;
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', i === activeIdx);
      });
    }

    function getActiveSection(leftIdx, rightIdx) {
      for (let s = SECTION_STARTS.length - 1; s >= 0; s--) {
        const range = pageItemRanges[leftIdx] || pageItemRanges[rightIdx];
        if (range && SECTION_STARTS[s] <= range.end) return s;
      }
      return 0;
    }

    function findSectionSpread(sectionIdx) {
      const itemIdx = SECTION_STARTS[sectionIdx];
      for (let i = 0; i < pageItemRanges.length; i++) {
        if (pageItemRanges[i].start <= itemIdx && pageItemRanges[i].end >= itemIdx) {
          return Math.floor(i / 2);
        }
      }
      return 0;
    }

    function flipNext() {
      if (isFlipping || currentSpread >= totalSpreads - 1) return;
      isFlipping = true;

      const notebook = document.getElementById('notebook');
      const currentRightHTML = document.getElementById('right-content').innerHTML;
      const nextLeftHTML = pages[(currentSpread + 1) * 2] || '';
      const nextRightHTML = pages[(currentSpread + 1) * 2 + 1] || '';

      const flipEl = document.createElement('div');
      flipEl.className = 'flip-element flip-next';

      const front = document.createElement('div');
      front.className = 'flip-face flip-front-right';
      front.innerHTML = currentRightHTML;

      const back = document.createElement('div');
      back.className = 'flip-face flip-back-face flip-back-left';
      back.innerHTML = nextLeftHTML;

      flipEl.appendChild(front);
      flipEl.appendChild(back);

      const shadow = document.createElement('div');
      shadow.className = 'flip-page-shadow next';

      const rightPage = document.getElementById('page-right');
      rightPage.style.visibility = 'hidden';

      notebook.appendChild(flipEl);
      notebook.appendChild(shadow);

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          flipEl.style.transition = `transform ${FLIP_DURATION}ms cubic-bezier(0.4,0.0,0.2,1)`;
          flipEl.style.transform = 'rotateY(-180deg)';
          shadow.style.opacity = '1';
        });
      });

      const midTimeout = setTimeout(() => {
        document.getElementById('left-content').innerHTML = nextLeftHTML;
        const li = (currentSpread + 1) * 2;
        document.getElementById('page-num-left').textContent = li < pages.length ? String(li + 1) : '';
      }, FLIP_DURATION * 0.45);

      const cleanup = () => {
        clearTimeout(midTimeout);
        currentSpread++;
        showSpread();
        rightPage.style.visibility = '';
        flipEl.remove();
        shadow.remove();
        isFlipping = false;
      };

      flipEl.addEventListener('transitionend', function handler(e) {
        if (e.propertyName !== 'transform') return;
        flipEl.removeEventListener('transitionend', handler);
        cleanup();
      });

      setTimeout(() => { if (isFlipping) cleanup(); }, FLIP_DURATION + 300);
    }

    function flipPrev() {
      if (isFlipping || currentSpread <= 0) return;
      isFlipping = true;

      const notebook = document.getElementById('notebook');
      const currentLeftHTML = document.getElementById('left-content').innerHTML;
      const prevLeftHTML = pages[(currentSpread - 1) * 2] || '';
      const prevRightHTML = pages[(currentSpread - 1) * 2 + 1] || '';

      const flipEl = document.createElement('div');
      flipEl.className = 'flip-element flip-prev';
      flipEl.style.transform = 'rotateY(180deg)';

      const front = document.createElement('div');
      front.className = 'flip-face flip-front-left';
      front.innerHTML = currentLeftHTML;

      const back = document.createElement('div');
      back.className = 'flip-face flip-back-face flip-back-right';
      back.innerHTML = prevRightHTML;

      flipEl.appendChild(front);
      flipEl.appendChild(back);

      const shadow = document.createElement('div');
      shadow.className = 'flip-page-shadow prev';

      const leftPage = document.getElementById('page-left');
      leftPage.style.visibility = 'hidden';

      notebook.appendChild(flipEl);
      notebook.appendChild(shadow);

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          flipEl.style.transition = `transform ${FLIP_DURATION}ms cubic-bezier(0.4,0.0,0.2,1)`;
          flipEl.style.transform = 'rotateY(0deg)';
          shadow.style.opacity = '1';
        });
      });

      const midTimeout = setTimeout(() => {
        document.getElementById('right-content').innerHTML = prevRightHTML;
        const ri = (currentSpread - 1) * 2 + 1;
        document.getElementById('page-num-right').textContent = ri < pages.length ? String(ri + 1) : '';
      }, FLIP_DURATION * 0.45);

      const cleanup = () => {
        clearTimeout(midTimeout);
        currentSpread--;
        showSpread();
        leftPage.style.visibility = '';
        flipEl.remove();
        shadow.remove();
        isFlipping = false;
      };

      flipEl.addEventListener('transitionend', function handler(e) {
        if (e.propertyName !== 'transform') return;
        flipEl.removeEventListener('transitionend', handler);
        cleanup();
      });

      setTimeout(() => { if (isFlipping) cleanup(); }, FLIP_DURATION + 300);
    }

    function navigateToSection(sectionIdx) {
      const targetSpread = findSectionSpread(sectionIdx);
      if (targetSpread === currentSpread || isFlipping) return;

      isFlipping = true;
      const leftPage = document.getElementById('page-left');
      const rightPage = document.getElementById('page-right');

      leftPage.classList.add('page-fade-out');
      rightPage.classList.add('page-fade-out');

      setTimeout(() => {
        currentSpread = targetSpread;
        showSpread();

        leftPage.classList.remove('page-fade-out');
        rightPage.classList.remove('page-fade-out');
        leftPage.classList.add('page-fade-in');
        rightPage.classList.add('page-fade-in');

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            leftPage.classList.remove('page-fade-in');
            rightPage.classList.remove('page-fade-in');
            isFlipping = false;
          });
        });
      }, 220);
    }

    document.getElementById('prev-btn').addEventListener('click', flipPrev);
    document.getElementById('next-btn').addEventListener('click', flipNext);

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        navigateToSection(parseInt(tab.dataset.section));
      });
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); flipNext(); }
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); flipPrev(); }
    });

    let touchStartX = 0;
    let touchStartY = 0;
    const nb = document.getElementById('notebook');

    nb.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }, { passive: true });

    nb.addEventListener('touchend', (e) => {
      const dx = touchStartX - e.changedTouches[0].screenX;
      const dy = touchStartY - e.changedTouches[0].screenY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
        if (dx > 0) flipNext();
        else flipPrev();
      }
    }, { passive: true });

    window.addEventListener('load', paginate);
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(paginate, 200);
    });
  </script>
</body>
</html>
